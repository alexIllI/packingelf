name: CI – Desktop App Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtshadertools

      - name: Configure
        working-directory: desktop-app
        run: cmake --preset ci

      - name: Build
        working-directory: desktop-app
        run: cmake --build --preset ci
