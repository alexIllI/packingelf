name: CI – Desktop App Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: C++ Desktop App ─────────────────────────────────────────────────
  build:
    name: Build C++ (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtshadertools

      - name: Configure
        working-directory: desktop-app
        run: cmake --preset ci

      - name: Build
        working-directory: desktop-app
        run: |
          $output = cmake --build --preset ci 2>&1
          $lines = $output -split "`n"
          if ($lines.Count -gt 100) {
            Write-Host "... ($($lines.Count - 100) lines truncated) ..."
            $lines[-100..-1] | ForEach-Object { Write-Host $_ }
          } else {
            $output | Write-Host
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  # ── Job 2: Python Scraper Lint & Smoke Test ────────────────────────────────
  scraper-lint:
    name: Scraper Syntax Check (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (no browser download)
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Syntax check all scraper modules
        working-directory: scraper
        run: |
          python -m py_compile src/models.py    && echo "models.py OK"
          python -m py_compile src/account_store.py && echo "account_store.py OK"
          python -m py_compile src/scraper.py   && echo "scraper.py OK"
          python -m py_compile src/__main__.py  && echo "__main__.py OK"

      - name: Verify CLI help works (import smoke test)
        working-directory: scraper
        run: |
          python -m src --help
          python -m src daemon --help
          python -m src scrape --help
          python -m src account --help
