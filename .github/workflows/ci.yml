name: CI Desktop App Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build C++ (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtshadertools

      - name: Configure
        working-directory: desktop-app
        run: cmake --preset ci

      - name: Build
        working-directory: desktop-app
        run: |
          $output = cmake --build --preset ci 2>&1
          $lines = $output -split "`n"
          if ($lines.Count -gt 100) {
            Write-Host "... ($($lines.Count - 100) lines truncated) ..."
            $lines[-100..-1] | ForEach-Object { Write-Host $_ }
          } else {
            $output | Write-Host
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  host-build:
    name: Build Host App (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Maven
        shell: pwsh
        run: |
          $mavenVersion = "3.9.9"
          $zip = Join-Path $env:RUNNER_TEMP "apache-maven-$mavenVersion-bin.zip"
          $root = Join-Path $env:RUNNER_TEMP "apache-maven-$mavenVersion"
          Invoke-WebRequest -Uri "https://archive.apache.org/dist/maven/maven-3/$mavenVersion/binaries/apache-maven-$mavenVersion-bin.zip" -OutFile $zip
          Expand-Archive -LiteralPath $zip -DestinationPath $env:RUNNER_TEMP -Force
          Add-Content $env:GITHUB_PATH (Join-Path $root "bin")

      - name: Build Host App Image
        shell: pwsh
        working-directory: host-service
        run: .\build.ps1

      - name: Upload Host App Image
        uses: actions/upload-artifact@v4
        with:
          name: packingelf-host-app-image
          path: host-service/build-output/jpackage/PackingElf Host

  scraper-lint:
    name: Scraper Syntax Check (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (no browser download)
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Syntax check all scraper modules
        working-directory: scraper
        run: |
          python -m py_compile src/models.py
          python -m py_compile src/account_store.py
          python -m py_compile src/scraper.py
          python -m py_compile src/__main__.py

      - name: Verify CLI help works (import smoke test)
        working-directory: scraper
        run: |
          python -m src --help
          python -m src daemon --help
          python -m src scrape --help
          python -m src account --help
